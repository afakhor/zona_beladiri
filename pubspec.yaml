name: addhmescrn
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

# =========================================================
# DEPENDENCIES: Paket Utama yang Masuk ke Aplikasi
# =========================================================
dependencies:
  flutter:
    sdk: flutter
  home_widget: ^0.9.2
  shared_preferences: ^2.3.5
  path_provider: ^2.1.3
  cupertino_icons: ^1.0.8

# =========================================================
# DEV_DEPENDENCIES: Alat Pembantu Kompilasi (Linter & Versi)
# =========================================================
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

# =========================================================
# CONFIGURATION ALAT: Pengaturan Ikon & Splash Screen
# =========================================================
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/logo.png"

flutter_native_splash:
  color: "#F8FAFC"
  image: assets/images/splash.png
  android_12:
    image: assets/images/splash.png
    color: "#F8FAFC"

# =========================================================
# FLUTTER ASSETS: Pendaftaran Folder Gambar
# =========================================================
flutter:
  uses-material-design: true
  assets:
    - assets/images/