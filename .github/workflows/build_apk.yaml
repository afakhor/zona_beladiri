name: Flutter Auto Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Tarik Kode dari Repository
        uses: actions/checkout@v4

      # KEMBALI KE JAVA 17 AGAR GRADLE TIDAK MOGOK
      - name: Setup Java Jdk
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # KITA SUNTIKKAN OBAT PENAWAR BENDERA JVM DI SINI
      - name: Konfigurasi Akses XML Java 17
        run: echo "GRADLE_OPTS=-Dorg.gradle.jvmargs=--add-opens=java.base/java.lang=ALL-UNNAMED" >> $GITHUB_ENV

      - name: Setup Flutter Environment
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      - name: Ambil Dependensi Project
        run: flutter pub get

      - name: Jalankan Perangkat Pembuat Gambar/Splash
        run: |
          flutter pub run flutter_launcher_icons
          flutter pub run flutter_native_splash:create

      - name: Compile Menjadi APK Debug/Release
        run: flutter build apk --debug

      - name: Upload File APK Hasil Jadi
        uses: actions/upload-artifact@v4
        with:
          name: Aplikasi-Hapkido-APK
          path: build/app/outputs/flutter-apk/app-debug.apk