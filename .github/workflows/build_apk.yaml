name: Flutter Auto Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Tarik Kode dari Repository
        uses: actions/checkout@v4

      - name: Setup Java Jdk
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter Environment
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'

      # ========================================================
      # OPERASI BESAR: TIMPA KODE FLUTTER INTERNAL YANG RUSAK
      # ========================================================
      - name: Perbaikan Bug XmlParser Java 17 Internal Flutter
        run: |
          # 1. Amputasi baris import QName pembawa sial
          sed -i '/import groovy.xml.QName/d' $FLUTTER_ROOT/packages/flutter_tools/gradle/src/main/groovy/flutter.groovy
          
          # 2. Ganti fungsi XmlParser di baris 522 menjadi parser string aman
          sed -i 's/def manifest = new XmlParser().parse(processResources.manifestFile)/def manifestFile = processResources.manifestFile; def manifestText = manifestFile.exists() ? manifestFile.text : ""; def matcher = manifestText =~ "package=\\\"([^\\\"]+)\\\""; def manifest = [attribute: { Object key -> if (key.toString().endsWith("package")) return matcher ? matcher[0][1] : "com.example.app" ; return "" }]/g' $FLUTTER_ROOT/packages/flutter_tools/gradle/src/main/groovy/flutter.groovy
          
          # 3. Jinakkan pengecekan QName di baris 556 agar selalu bernilai true/bypass
          sed -i 's/if (entry.key instanceof QName)/if (entry.key != null)/g' $FLUTTER_ROOT/packages/flutter_tools/gradle/src/main/groovy/flutter.groovy
          
          echo "✓ Operasi penjinakan XmlParser & QName sukses besar!"

      - name: Ambil Dependensi Project
        run: flutter pub get

      - name: Jalankan Perangkat Pembuat Gambar/Splash
        run: |
          flutter pub run flutter_launcher_icons
          flutter pub run flutter_native_splash:create

      - name: Compile Menjadi APK Debug/Release
         run: |
    flutter clean
    flutter pub get
    flutter build apk --debug
        
      - name: Upload File APK Hasil Jadi
        uses: actions/upload-artifact@v4
        with:
          name: Zona-Beladiri
          path: build/app/outputs/flutter-apk/app-debug.apk