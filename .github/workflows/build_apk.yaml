name: Flutter Auto Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Tarik Kode dari Repository
        uses: actions/checkout@v4

      # Menggunakan Java 17 yang stabil dan aman
      - name: Setup Java Jdk
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # KITA GUNAKAN FLUTTER VERSI BARU YANG SUDAH BEBAS DARI ERROR GROOVY
      - name: Setup Flutter Environment
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.x' # Mengunci ke rumpun 3.27 yang sudah diperbaiki Google
          channel: 'stable'
          cache: true # Mengaktifkan cache agar build berikutnya lebih cepat

      - name: Ambil Dependensi Project
        run: flutter pub get

      - name: Jalankan Perangkat Pembuat Gambar/Splash
        run: |
          flutter pub run flutter_launcher_icons
          flutter pub run flutter_native_splash:create

      - name: Compile Menjadi APK Debug/Release
        run: flutter build apk --debug
        
      - name: Upload File APK Hasil Jadi
        uses: actions/upload-artifact@v4
        with:
          name: Aplikasi-Hapkido-APK
          path: build/app/outputs/flutter-apk/app-debug.apk